{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRESScode. - Recuperar Senha</title>

  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Expanded:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/Style.css' %}" />
</head>

<body>

  <nav aria-label="Menu principal">
    <a href="{% url 'landing' %}" class="brand-logo" aria-label="Ir para a página inicial">
      <img src="{% static 'media/logo/Logo Horizontal.png' %}" alt="DRESScode">
    </a>
    <a href="{% url 'login' %}" class="btn btn-outline">Login</a>
  </nav>

  <main class="auth-content">
    <div class="auth-box">
      <h1>Recuperar senha</h1>

      <p id="reset-description">
        Informe seu e-mail e enviaremos um link para criar uma nova senha.
      </p>

      <form method="POST" action="" aria-describedby="reset-description">
        {% csrf_token %}

        <div class="input-group">
          <label for="id_email">E-mail</label>
          <input
            type="email"
            id="id_email"
            name="email"
            placeholder="seu@email.com"
            required
            autocomplete="email"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Enviar link de recuperação
        </button>
      </form>

      <p style="text-align: center; margin-top: 16px; font-size: 14px;">
        <a href="{% url 'login' %}" style="color: var(--black); text-decoration: underline;">
          Voltar ao login
        </a>
      </p>
    </div>
  </main>

  <footer aria-label="Informações do projeto">
    <span class="brand">DRESScode.</span>
    <ul class="integrantes">
      <li>
        <p>Ana Beatriz • Beatriz Loyola • Júlia Tenório • Gustavo Rezende • Matheus Lima • Rafael Carrilho • Pedro Bedor</p>
      </li>
    </ul>
  </footer>

</body>
</html>
