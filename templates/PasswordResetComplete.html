{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRESScode. - Senha Redefinida</title>

  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Expanded:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/Style.css' %}" />
</head>

<body>

  <nav aria-label="Menu principal">
    <a href="{% url 'landing' %}" class="brand-logo" aria-label="Ir para a página inicial">
      <img src="{% static 'media/logo/Logo Horizontal.png' %}" alt="DRESScode">
    </a>
    <a href="{% url 'login' %}" class="btn btn-outline">Login</a>
  </nav>

  <main class="auth-content">
    <div class="auth-box">
      <h1>Senha redefinida!</h1>

      <p style="text-align: center; margin-bottom: 24px;">
        Sua senha foi alterada com sucesso. Faça login para continuar.
      </p>

      <a href="{% url 'login' %}" class="btn btn-primary btn-full" style="text-align: center; text-decoration: none;">
        Ir para o login
      </a>
    </div>
  </main>

  <footer aria-label="Informações do projeto">
    <span class="brand">DRESScode.</span>
    <ul class="integrantes">
      <li>
        <p>Ana Beatriz • Beatriz Loyola • Júlia Tenório • Gustavo Rezende • Matheus Lima • Rafael Carrilho • Pedro Bedor</p>
      </li>
    </ul>
  </footer>

</body>
</html>
