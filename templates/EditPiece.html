<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRESScode. - Editar Peça</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Expanded:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="Style.css" />
</head>
<body>

  <nav>
    <a href="Dashboard.html" class="brand-logo">
      <img src="media/logo/Logo Horizontal.png" alt="DRESScode Logo">
    </a>
    <div class="nav-landing">
        <a href="MyPieces.html" class="btn btn-outline">Gerenciar Peças</a>
        <a href="Dashboard.html" class="btn btn-outline">Gerenciar Outfits</a>
        <a href="MyAccount.html" class="btn btn-primary">Minha Conta</a>
    </div>
  </nav>

  <main class="auth-content">
    <div class="auth-box upload-box">
      <h2>Editar Peça</h2>
      <p>Atualize as informações desta peça do seu guarda-roupa.</p>

      <form action="MyPieces.html">
        
        <div class="card" style="margin: 0 auto 24px; width: 200px; cursor: default;">
          <div class="card-image-box" style="background-image: url('media/blusas/blusa1.png'); background-size: contain; background-color: #f9f9f9; aspect-ratio: 1/1; margin-bottom: 0;"></div>
        </div>

        <div class="input-group">
          <label for="piece-name">Nome</label>
          <input type="text" id="piece-name" value="Top Marrom Poá" required>
        </div>

        <div class="input-group">
          <label for="piece-category">Categoria</label>
          <select id="piece-category" required>
            <option value="shirt" selected>Parte de cima (Blusas, Camisas, Casacos)</option>
            <option value="pants">Parte de baixo (Calças, Saias, Shorts)</option>
            <option value="shoes">Sapatos e Calçados</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Salvar alterações</button>
      </form>
    </div>
  </main>

  <footer>
    <span class="brand">DRESScode.</span>
    <ul class="integrantes">
      <li><p>Ana Beatriz • Beatriz Loyola • Júlia Tenório • Gustavo Rezende • Matheus Lima • Rafael Carrilho • Pedro Bedor</p></li>
    </ul>
  </footer>

</body>
</html>
