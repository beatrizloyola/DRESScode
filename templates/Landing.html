{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRESScode. - Seu guarda-roupa virtual</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Expanded:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/Style.css' %}" />
</head>

<body>

  <nav class="nav-landing" aria-label="Menu principal">
    <a href="{% url 'signup' %}" class="btn btn-primary">Registrar</a>
    <a href="{% url 'login' %}" class="btn btn-outline">Login</a>
  </nav>

  <main>
    <section class="hero" aria-label="DRESScode. Seu guarda-roupa virtual">
      <div class="logo-wrap">
        <img
          src="{% static 'media/logo/Logo Vertical.png' %}"
          alt="Logo DRESScode."
        />
      </div>

      <p class="tagline">Seu guarda-roupa virtual</p>
    </section>

    <div class="clothes-strip" aria-hidden="true">
      <div class="strip-track">
        <img src="{% static 'media/blusas/blusa1.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa2.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa3.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa4.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa5.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa6.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa7.png' %}" alt="" />

        <img src="{% static 'media/blusas/blusa1.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa2.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa3.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa4.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa5.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa6.png' %}" alt="" />
        <img src="{% static 'media/blusas/blusa7.png' %}" alt="" />
      </div>
    </div>

    <div class="clothes-strip pants-strip" aria-hidden="true">
      <div class="pants-track">
        <img src="{% static 'media/calcas/calca1.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca2.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca3.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca4.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca5.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca6.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca7.png' %}" alt="" />

        <img src="{% static 'media/calcas/calca1.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca2.png' %}" alt="" class="short" />
        <img src="{% static 'media/calcas/calca3.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca4.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca5.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca6.png' %}" alt="" />
        <img src="{% static 'media/calcas/calca7.png' %}" alt="" class="short" />
      </div>
    </div>
  </main>

  <footer aria-label="Informações do projeto">
    <span class="brand">DRESScode.</span>
    <ul class="integrantes">
      <li><p>Ana Beatriz • Beatriz Loyola • Gustavo Rezende • Júlia Tenório • Matheus Lima • Pedro Bedor • Rafael Carrilho</p></li>
    </ul>
  </footer>

</body>
</html>
