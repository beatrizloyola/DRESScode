<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRESScode. - Adicionar Peça</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Expanded:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="Style.css" />
</head>
<body>

  <nav>
    <a href="Dashboard.html" class="brand-logo">
      <img src="media/logo/Logo Horizontal.png">
    </a>
    <a href="Dashboard.html" class="btn btn-outline">Voltar ao Dashboard</a>
  </nav>

  <main class="auth-content">
    <div class="auth-box upload-box">
      <h2>Adicionar Peça</h2>
      <p>Faça o upload de uma nova peça para o seu guarda-roupa.</p>

      <form action="Dashboard.html">
        
        <div class="upload-dropzone" id="dropzone">
          <input type="file" id="file-upload" accept="image/*" hidden>
          
          <label for="file-upload" class="dropzone-label" id="dropzone-label">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
              <path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM232 344V280H168c-13.3 0-24-10.7-24-24s10.7-24 24-24h64V168c0-13.3 10.7-24 24-24s24 10.7 24 24v64h64c13.3 0 24 10.7 24 24s-10.7 24-24 24H280v64c0 13.3-10.7 24-24 24s-24-10.7-24-24z"/>
            </svg>
            <span>Clique ou arraste a imagem aqui</span>
          </label>
          
          <div id="image-preview" class="image-preview"></div>
        </div>

        <div class="input-group">
          <label for="piece-name">Nome (Opcional)</label>
          <input type="text" id="piece-name" placeholder="Ex: Camiseta Básica Preta">
        </div>

        <div class="input-group">
          <label for="piece-category">Categoria</label>
          <select id="piece-category" required>
            <option value="" disabled selected>Selecione uma categoria...</option>
            <option value="shirt">Parte de cima (Blusas, Camisas, Casacos)</option>
            <option value="pants">Parte de baixo (Calças, Saias, Shorts)</option>
            <option value="shoes">Sapatos e Calçados</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Salvar nova peça</button>
      </form>
    </div>
  </main>

  <footer>
    <span class="brand">DRESScode.</span>
    <ul class="integrantes">
      <li><p>Ana Beatriz • Beatriz Loyola • Júlia Tenório • Gustavo Rezende • Matheus Lima • Rafael Carrilho • Pedro Bedor</p></li>
    </ul>
  </footer>

  <script>
    const fileInput = document.getElementById('file-upload');
    const imagePreview = document.getElementById('image-preview');
    const dropzoneLabel = document.getElementById('dropzone-label');

    fileInput.addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          imagePreview.style.backgroundImage = `url('${e.target.result}')`;
          imagePreview.style.display = 'block';
          dropzoneLabel.style.opacity = '0'; // Esconde o texto/ícone
        }
        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
