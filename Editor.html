<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DRESScode</title>
        <link href="Editor.css" rel="stylesheet">
    </head>
    <body>
        <div class="main">
            <div class="lookPreview" id="lookPreview">
                <div class="shirt editor">
                    <div class="arrowBack" id="shirtBack"></div>
                    <div class="preview" id="shirtPreview"></div>
                    <div class="arrowFoward" id="shirtFoward"></div>
                </div>
                <div class="pants editor">
                    <div class="arrowBack" id="pantsBack"></div>
                    <div class="preview" id="pantsPreview"></div>
                    <div class="arrowFoward" id="pantsFoward"></div>
                </div>
                <div class="shoes editor">
                    <div class="arrowBack" id="shoesBack"></div>
                    <div class="preview" id="shoesPreview"></div>
                    <div class="arrowFoward" id="shoesFoward"></div>
                </div>
            </div>

            <div class="lookInfo">
                <div class="nameArea">
                    Nome:<br>
                    <input type="text" id="nameInput" maxlength="26">
                    <div id="noNameMsg"></div>
                </div>
                <div class="tagArea">
                    Tags:
                    <div class="tagList" id="tagList">
                        <div class="tag" id="addTag">+</div>
                    </div>
                </div>
                <div class="completeArea">
                    <button type="button" class="back button" id="back">Voltar</button>
                    <button type="button" class="save button" id="save">Salvar</button>
                </div>
            </div>
        </div>
        <script src="Editor.js"></script>
    </body>
</html>
