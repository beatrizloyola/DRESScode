<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRESScode. - Entrar</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Expanded:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="Style.css" />
</head>
<body>

  <nav>
    <a href="Landing.html" class="brand-logo">
      <img src="media/logo/Logo Horizontal.png">
    </a>
    <a href="SignUp.html" class="btn btn-outline">Registrar</a>
  </nav>

  <main class="auth-content">
    <div class="auth-box">
      <h2>Bem-vindo de volta!</h2>
      <p>Acesse o seu guarda-roupa virtual.</p>

      <form action="Dashboard.html">
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="input-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <a href="#" class="forgot-password">Esqueceu a senha?</a>

        <button type="submit" class="btn btn-primary btn-full">Entrar</button>
      </form>
    </div>
  </main>

  <footer>
    <span class="brand">DRESScode.</span>
    <ul class="integrantes">
      <li><p>Ana Beatriz • Beatriz Loyola • Júlia Tenório • Gustavo Rezende • Matheus Lima • Rafael Carrilho • Pedro Bedor</p></li>
    </ul>
  </footer>

</body>
</html>
